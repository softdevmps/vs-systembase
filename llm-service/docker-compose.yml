services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    volumes:
      - ollama:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
    volumes:
      - ollama:/root/.ollama
    entrypoint: /bin/sh
    command: -lc "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull \"$OLLAMA_MODEL\""
    restart: "no"

volumes:
  ollama:
